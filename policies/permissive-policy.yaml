# WARNING: This policy is for development/debugging only.
# DO NOT use in production environments.

version: 1

filesystem_policy:
  read_only:
    - /usr
    - /lib
    - /etc
  read_write:
    - /sandbox
    - /tmp

network_policies:
  inference:
    endpoints:
      - host: inference.local
        access: allow
  all:
    endpoints:
      - host: "*"
        access: allow
