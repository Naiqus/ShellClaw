# WARNING: This policy is for development/debugging only.
# DO NOT use in production environments.

filesystem:
  - path: /usr
    permission: read_only
  - path: /lib
    permission: read_only
  - path: /etc
    permission: read_only
  - path: /sandbox
    permission: read_write
  - path: /tmp
    permission: read_write

network:
  default_action: allow
  log: true

  rules:
    - endpoint: inference.local
      action: allow
      protocol: any
