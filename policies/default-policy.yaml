version: 1

filesystem_policy:
  read_only:
    - /usr
    - /lib
    - /etc
  read_write:
    - /sandbox
    - /tmp

network_policies:
  inference:
    endpoints:
      - host: inference.local
        access: allow
  github:
    endpoints:
      - host: github.com
        access: allow
  npm:
    endpoints:
      - host: "*.npmjs.org"
        access: allow
